<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng Ký Xe Đưa Đón - KTX</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a5276;
    --primary-light: #2e86c1;
    --bg: #f0f4f8;
    --white: #ffffff;
    --text: #2c3e50;
    --border: #dce3ea;
    --error: #e74c3c;
    --shadow: 0 4px 24px rgba(26,82,118,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    background: linear-gradient(135deg, #1a5276 0%, #2e86c1 60%, #85c1e9 100%);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .login-wrap { width: 100%; max-width: 420px; }
  .logo-area { text-align: center; margin-bottom: 32px; }
  .logo-icon {
    width: 72px; height: 72px; background: var(--white);
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); font-size: 36px;
  }
  .logo-area h1 { color: #fff; font-size: 22px; font-weight: 700; }
  .logo-area p { color: rgba(255,255,255,0.8); font-size: 13px; margin-top: 4px; }
  .card { background: var(--white); border-radius: 20px; padding: 36px 32px; box-shadow: var(--shadow); }
  .card h2 { font-size: 20px; color: var(--primary); font-weight: 700; margin-bottom: 24px; text-align: center; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
  .form-group input {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
    border-radius: 10px; font-size: 15px; font-family: inherit; color: var(--text);
    transition: border-color 0.2s; outline: none;
  }
  .form-group input:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(46,134,193,0.1); }
  .btn-login {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: #fff; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
  }
  .btn-login:hover { opacity: 0.93; }
  .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
  .error-msg {
    background: #fdecea; color: var(--error); border-radius: 8px;
    padding: 10px 14px; font-size: 13px; margin-top: 14px; display: none; text-align: center;
  }
  .error-msg.show { display: block; }
  .footer-note { text-align: center; color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 20px; }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.5); border-top-color: #fff;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="logo-area">
    <div class="logo-icon">🚌</div>
    <h1>Đăng Ký Xe Đưa Đón</h1>
    <p>Hệ thống quản lý Ký Túc Xá</p>
  </div>
  <div class="card">
    <h2>Đăng Nhập</h2>
    <div class="form-group">
      <label>Tên đăng nhập</label>
      <input type="text" id="username" placeholder="Nhập tên đăng nhập" autocomplete="username">
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
    </div>
    <button class="btn-login" id="btnLogin" onclick="doLogin()">Đăng Nhập</button>
    <div class="error-msg" id="errMsg"></div>
  </div>
  <div class="footer-note">© 2026 Hệ thống KTX • Phiên bản 1.0</div>
</div>

<script>
// ✅ URL CỐ ĐỊNH - không cần nhập trên mỗi máy
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwcI-ydRaEQ1wa2C_Ev4G3cTe1NT_hY7UxzTsIsO68n3zEcqPVwsBJnorDqFn2hKElG/exec';

window.onload = function() {
  const user = sessionStorage.getItem('ktx_user');
  if (user) { window.location.href = 'app.html'; return; }
  document.getElementById('password').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
  document.getElementById('username').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
};

async function doLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('btnLogin');
  const err = document.getElementById('errMsg');

  if (!username || !password) { showError('Vui lòng nhập tên đăng nhập và mật khẩu'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Đang đăng nhập...';
  err.classList.remove('show');

  try {
    const params = new URLSearchParams({ action: 'login', username, password });
    const res = await fetch(GAS_URL + '?' + params.toString(), { method: 'GET', redirect: 'follow' });
    const text = await res.text();
    const data = JSON.parse(text);
    if (data.success) {
      sessionStorage.setItem('ktx_user', JSON.stringify(data.user));
      window.location.href = 'app.html';
    } else {
      showError(data.error || 'Sai tên đăng nhập hoặc mật khẩu');
    }
  } catch(e) {
    showError('Không thể kết nối. Kiểm tra lại đường truyền.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Đăng Nhập';
  }
}

function showError(msg) {
  const err = document.getElementById('errMsg');
  err.textContent = msg;
  err.classList.add('show');
}
</script>
</body>
</html>
